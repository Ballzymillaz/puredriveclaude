version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: puredrive_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: puredrive
      POSTGRES_USER: puredrive
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puredrive -d puredrive"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis (cache + sessions) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: puredrive_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puredrive_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://puredrive:${DB_PASSWORD}@db:5432/puredrive
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - internal
    labels:
      - "traefik.enable=false"

  # ── Frontend React (build statique servi par Nginx) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: puredrive_frontend
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: puredrive_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  pg_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
